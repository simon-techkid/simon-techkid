<header id="home" class="py-5 shadow">
    <div class="container">
        <a href="/" class="text-decoration-none">
            <h1 class="display-4">Simon Field</h1>
        </a>
        <p class="fs-5 mb-0">
            Pronouns: they/them
        </p>
        <p class="fs-5 mb-3">
            <a href="mailto:{{ site.email-professional }}"
               class="text-white text-decoration-underline">{{ site.email-professional }}</a>
        </p>
        <span class="badge bg-warning text-dark p-2">
            Software Developer
        </span>
    </div>
</header>
<nav class="navbar navbar-expand-lg bg-light shadow-sm sticky-top mb-4">
    <div class="container">
        <div class="navbar-nav me-auto">
            <a class="nav-link fw-bold" href="/">
                <i class="bi bi-house-fill me-2 text-primary"></i>
                Home
            </a>
        </div>
        <div class="navbar-nav mx-auto" id="dynamic-nav-center">
            {% for link in page.nav_center %}
            <a class="nav-link" href="{{ link.url }}">{{ link.title }}</a>
            {% endfor %}
        </div>
        <div class="navbar-nav ms-auto">
            {% for link in page.nav_right %}
            <a class="nav-link" href="{{ link.url }}">{{ link.title }}</a>
            {% endfor %}
        </div>
    </div>
</nav>
